<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validation Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .glass-effect {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .stellar-gradient {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
        }
        
        /* Validation styles */
        .error-message {
            animation: slideIn 0.3s ease-out;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        input.error, textarea.error {
            border-color: #ef4444 !important;
            background-color: rgba(239, 68, 68, 0.1) !important;
            animation: shake 0.3s ease-in-out;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        
        input.valid, textarea.valid {
            border-color: #10b981 !important;
            background-color: rgba(16, 185, 129, 0.1) !important;
        }
    </style>
</head>
<body class="stellar-gradient min-h-screen text-white p-8">
    <div class="max-w-2xl mx-auto">
        <h1 class="text-3xl font-bold mb-8 text-center">Validation Test Suite</h1>
        
        <!-- Test Results -->
        <div id="testResults" class="glass-effect rounded-xl p-6 mb-8">
            <h2 class="text-xl font-bold mb-4">Test Results</h2>
            <div id="results" class="space-y-2"></div>
        </div>
        
        <!-- Test Forms -->
        <div class="space-y-6">
            <!-- Auth Form Test -->
            <div class="glass-effect rounded-xl p-6">
                <h3 class="text-lg font-bold mb-4">Authentication Form</h3>
                <form id="authForm" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium mb-2">Username</label>
                        <input type="text" id="username" class="w-full px-4 py-2 rounded-lg bg-white bg-opacity-20 border border-white border-opacity-30 focus:outline-none focus:ring-2 focus:ring-purple-400">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2">Password</label>
                        <input type="password" id="password" class="w-full px-4 py-2 rounded-lg bg-white bg-opacity-20 border border-white border-opacity-30 focus:outline-none focus:ring-2 focus:ring-purple-400">
                    </div>
                    <button type="button" onclick="testAuthValidation()" class="bg-purple-600 hover:bg-purple-700 px-4 py-2 rounded-lg transition">
                        Test Auth Validation
                    </button>
                </form>
            </div>
            
            <!-- Auction Form Test -->
            <div class="glass-effect rounded-xl p-6">
                <h3 class="text-lg font-bold mb-4">Auction Creation Form</h3>
                <form id="createAuctionForm" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium mb-2">Title</label>
                        <input type="text" id="auctionTitle" class="w-full px-4 py-2 rounded-lg bg-white bg-opacity-20 border border-white border-opacity-30 focus:outline-none focus:ring-2 focus:ring-purple-400">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2">Description</label>
                        <textarea id="auctionDescription" rows="3" class="w-full px-4 py-2 rounded-lg bg-white bg-opacity-20 border border-white border-opacity-30 focus:outline-none focus:ring-2 focus:ring-purple-400"></textarea>
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2">Starting Bid ($)</label>
                        <input type="number" id="startingBid" min="0" step="0.01" class="w-full px-4 py-2 rounded-lg bg-white bg-opacity-20 border border-white border-opacity-30 focus:outline-none focus:ring-2 focus:ring-purple-400">
                    </div>
                    <button type="button" onclick="testAuctionValidation()" class="bg-purple-600 hover:bg-purple-700 px-4 py-2 rounded-lg transition">
                        Test Auction Validation
                    </button>
                </form>
            </div>
            
            <!-- Bid Form Test -->
            <div class="glass-effect rounded-xl p-6">
                <h3 class="text-lg font-bold mb-4">Bid Form</h3>
                <form id="bidForm" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium mb-2">Bid Amount ($)</label>
                        <input type="number" id="bidAmount" min="0" step="0.01" class="w-full px-4 py-2 rounded-lg bg-white bg-opacity-20 border border-white border-opacity-30 focus:outline-none focus:ring-2 focus:ring-purple-400">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2">Secret Key</label>
                        <input type="password" id="secretKey" class="w-full px-4 py-2 rounded-lg bg-white bg-opacity-20 border border-white border-opacity-30 focus:outline-none focus:ring-2 focus:ring-purple-400">
                    </div>
                    <button type="button" onclick="testBidValidation()" class="bg-purple-600 hover:bg-purple-700 px-4 py-2 rounded-lg transition">
                        Test Bid Validation
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        // Test functions
        function runTest(testName, testFunction) {
            try {
                const result = testFunction();
                addTestResult(testName, result.success, result.message);
            } catch (error) {
                addTestResult(testName, false, `Error: ${error.message}`);
            }
        }
        
        function addTestResult(testName, passed, message) {
            const resultsDiv = document.getElementById('results');
            const resultDiv = document.createElement('div');
            resultDiv.className = `flex items-center space-x-2 ${passed ? 'text-green-400' : 'text-red-400'}`;
            resultDiv.innerHTML = `
                <i class="fas fa-${passed ? 'check-circle' : 'times-circle'}"></i>
                <span><strong>${testName}:</strong> ${message}</span>
            `;
            resultsDiv.appendChild(resultDiv);
        }
        
        function testAuthValidation() {
            clearAllErrors('authForm');
            
            // Test empty username
            document.getElementById('username').value = '';
            const usernameErrors = validateField('', ValidationRules.username);
            if (usernameErrors.length === 0) {
                addTestResult('Empty Username Validation', false, 'Should detect empty username');
                return;
            }
            showError('username', usernameErrors);
            
            // Test invalid username (too short)
            document.getElementById('username').value = 'ab';
            const shortUsernameErrors = validateField('ab', ValidationRules.username);
            if (shortUsernameErrors.length === 0) {
                addTestResult('Short Username Validation', false, 'Should detect username too short');
                return;
            }
            
            // Test valid username
            document.getElementById('username').value = 'testuser123';
            const validUsernameErrors = validateField('testuser123', ValidationRules.username);
            if (validUsernameErrors.length > 0) {
                addTestResult('Valid Username Validation', false, 'Should accept valid username');
                return;
            }
            
            // Test password validation
            document.getElementById('password').value = 'weak';
            const weakPasswordErrors = validateField('weak', ValidationRules.password);
            if (weakPasswordErrors.length === 0) {
                addTestResult('Weak Password Validation', false, 'Should detect weak password');
                return;
            }
            
            // Test valid password
            document.getElementById('password').value = 'StrongPass123';
            const validPasswordErrors = validateField('StrongPass123', ValidationRules.password);
            if (validPasswordErrors.length > 0) {
                addTestResult('Valid Password Validation', false, 'Should accept valid password');
                return;
            }
            
            clearAllErrors('authForm');
            addTestResult('Auth Validation', true, 'All validation rules working correctly');
        }
        
        function testAuctionValidation() {
            clearAllErrors('createAuctionForm');
            
            // Test title validation
            document.getElementById('auctionTitle').value = 'short';
            const titleErrors = validateField('short', ValidationRules.auctionTitle);
            if (titleErrors.length === 0) {
                addTestResult('Short Title Validation', false, 'Should detect title too short');
                return;
            }
            
            // Test description validation
            document.getElementById('auctionDescription').value = 'brief';
            const descErrors = validateField('brief', ValidationRules.auctionDescription);
            if (descErrors.length === 0) {
                addTestResult('Short Description Validation', false, 'Should detect description too short');
                return;
            }
            
            // Test starting bid validation
            document.getElementById('startingBid').value = '-10';
            const bidErrors = validateField('-10', ValidationRules.startingBid);
            if (bidErrors.length === 0) {
                addTestResult('Negative Bid Validation', false, 'Should detect negative bid');
                return;
            }
            
            clearAllErrors('createAuctionForm');
            addTestResult('Auction Validation', true, 'All auction validation rules working correctly');
        }
        
        function testBidValidation() {
            clearAllErrors('bidForm');
            
            // Test bid amount validation
            document.getElementById('bidAmount').value = '0';
            const amountErrors = validateField('0', ValidationRules.bidAmount);
            if (amountErrors.length === 0) {
                addTestResult('Zero Bid Validation', false, 'Should detect zero bid');
                return;
            }
            
            // Test secret key validation
            document.getElementById('secretKey').value = 'weak';
            const keyErrors = validateField('weak', ValidationRules.secretKey);
            if (keyErrors.length === 0) {
                addTestResult('Weak Secret Key Validation', false, 'Should detect weak secret key');
                return;
            }
            
            clearAllErrors('bidForm');
            addTestResult('Bid Validation', true, 'All bid validation rules working correctly');
        }
        
        // Run all tests on page load
        window.addEventListener('load', function() {
            addTestResult('Test Suite Initialized', true, 'Ready to run validation tests');
        });
    </script>
</body>
</html>
